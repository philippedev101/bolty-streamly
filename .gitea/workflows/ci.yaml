name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ghc: "9.6.7"
            stack-yaml: stack-ghc-9.6.yaml
          - ghc: "9.8.4"
            stack-yaml: stack-ghc-9.8.yaml
          - ghc: "9.10.3"
            stack-yaml: stack.yaml
          - ghc: "9.12.3"
            stack-yaml: stack-ghc-9.12.yaml
    steps:
      - uses: actions/checkout@v4
        with:
          path: bolty-streamly

      - name: Clone sibling repos
        run: |
          git clone https://github.com/philippedev101/bolty.git bolty
          git clone https://github.com/philippedev101/packstream.git packstream

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y curl gcc g++ make libgmp-dev libtinfo-dev zlib1g-dev libffi-dev

      - name: Install Stack
        run: curl -sSL https://get.haskellstack.org/ | sh

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ matrix.ghc }}-${{ hashFiles(format('bolty/{0}', matrix.stack-yaml)) }}
          restore-keys: stack-${{ matrix.ghc }}-

      - name: Build all packages (GHC ${{ matrix.ghc }})
        working-directory: bolty
        run: stack build --stack-yaml ${{ matrix.stack-yaml }} --no-nix --no-system-ghc

      - name: Run unit tests
        working-directory: bolty
        run: stack test bolty-streamly:bolty-streamly-test --stack-yaml ${{ matrix.stack-yaml }} --no-nix --no-system-ghc
